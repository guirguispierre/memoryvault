name = "ai-memory-mcp"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[vectorize]]
binding = "MEMORY_INDEX"
index_name = "ai-memory-semantic-v1"

[[d1_databases]]
binding = "DB"
database_name = "ai-memory"
database_id = "f881cdf0-9109-45a8-863f-65942a81a7bf"

[env.dev]
name = "ai-memory-mcp-dev"

[env.dev.ai]
binding = "AI"

[[env.dev.vectorize]]
binding = "MEMORY_INDEX"
index_name = "ai-memory-semantic-v1-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ai-memory"
database_id = "f881cdf0-9109-45a8-863f-65942a81a7bf"
