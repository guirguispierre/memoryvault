name = "memoryvault"
main = "src/index.ts"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[vectorize]]
binding = "MEMORY_INDEX"
index_name = "ai-memory-semantic-v1"

[[d1_databases]]
binding = "DB"
database_name = "ai-memory"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID"

[env.dev]
name = "memoryvault-dev"

[env.dev.ai]
binding = "AI"

[[env.dev.vectorize]]
binding = "MEMORY_INDEX"
index_name = "ai-memory-semantic-v1-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ai-memory"
database_id = "YOUR_D1_DATABASE_ID"

[[env.dev.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_DEV_KV_NAMESPACE_ID"
